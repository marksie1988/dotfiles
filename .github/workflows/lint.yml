name: lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck zsh
      - name: shellcheck
        run: |
          shopt -s globstar nullglob
          # Skip third-party plugins.
          files=( .zsh/*.sh .zsh/installers/*.sh )
          if [ ${#files[@]} -eq 0 ]; then echo "no files to lint"; exit 0; fi
          # zsh-specific files often trip bash-oriented shellcheck rules;
          # tell shellcheck to treat them as bash and disable the worst noise.
          # Excludes:
          #   SC1071/1090/1091 — zsh-only sources / dynamic sources
          #   SC2034/2086/2155/2016 — common noise in shell config files
          #   SC2154 — zsh terminfo / runtime-assigned variables
          #   SC2296/2298 — zsh parameter expansions bash shellcheck misreads
          #   SC1083 — literal braces in git rev-parse args (yadm log ..@{u})
          shellcheck --shell=bash --severity=warning \
            --exclude=SC1071,SC2034,SC2086,SC2155,SC1090,SC1091,SC2016,SC2154,SC2296,SC2298,SC1083 \
            "${files[@]}"
      - name: zsh syntax check
        run: |
          shopt -s globstar nullglob
          for f in .zsh/*.sh .zsh/installers/*.sh; do
            zsh -n "$f" || { echo "syntax error: $f"; exit 1; }
          done
