repos:
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args:
          - --shell=bash
          - --severity=warning
          - --exclude=SC1071,SC2034,SC2086,SC2155,SC1090,SC1091,SC2016,SC2154,SC2296,SC2298,SC1083
        files: ^\.zsh/(.*\.sh|installers/.*\.sh)$

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.8.0-1
    hooks:
      - id: shfmt
        args: [-i, "2", -ci, -w]
        files: ^\.zsh/(.*\.sh|installers/.*\.sh)$

  - repo: local
    hooks:
      - id: zsh-syntax-check
        name: zsh -n
        entry: zsh -n
        language: system
        files: ^\.zsh/(.*\.sh|installers/.*\.sh)$
